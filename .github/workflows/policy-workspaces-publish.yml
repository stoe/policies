name: reusable publish (workspace package)

on:
  workflow_call:
    inputs:
      npm:
        description: 'Publish workspaces to NPM'
        type: boolean
        default: false
      gh:
        description: 'Publish workspaces to GitHub Packages'
        type: boolean
        default: true
    secrets:
      npm_token:
        required: false

env:
  NODE_VERSION: 22
  NPM_SCOPE: '@stoe'

jobs:
  publish_npm:
    name: Publish to NPM
    if: ${{ inputs.npm }}

    runs-on: ubuntu-latest

    concurrency:
      group: ${{ github.workflow }}-npm-${{ github.ref }}
      cancel-in-progress: true

    permissions:
      contents: read
      packages: write
      id-token: write

    env:
      CI: true
      NODE_AUTH_TOKEN: ${{ secrets.npm_token }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          scope: ${{ env.NPM_SCOPE }}
          registry-url: 'https://registry.npmjs.org'

      - name: NPM config
        run: |
          npm pkg delete scripts.prepare
          npm install --ignore-scripts --pure-lockfile
          git ls-files -z . | xargs -0 git update-index --assume-unchanged

      - name: NPM publish
        run: npm publish --provenance --access public --workspaces

  publish_gh:
    name: Publish to GitHub
    if: ${{ inputs.gh }}

    runs-on: ubuntu-latest

    concurrency:
      group: ${{ github.workflow }}-gh-${{ github.ref }}
      cancel-in-progress: true

    permissions:
      contents: read
      packages: write

    env:
      CI: true
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          scope: ${{ env.NPM_SCOPE }}
          registry-url: 'https://npm.pkg.github.com'

      - name: NPM config
        run: |
          npm pkg delete scripts.prepare
          npm install --ignore-scripts --pure-lockfile
          git ls-files -z . | xargs -0 git update-index --assume-unchanged

      - name: GitHub Packages publish
        run: npm publish --access public --workspaces
